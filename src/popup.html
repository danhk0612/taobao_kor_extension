<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taobao Korean UI Translator</title>
    <link rel="stylesheet" href="./ui.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Taobao 한국어 변환</h1>
      <label class="toggle-row">
        <span>자동 번역</span>
        <input id="enabled" type="checkbox" />
      </label>
      <button id="openOptions" class="button">고급 설정</button>
      <p class="hint">중국어 UI 텍스트를 한국어로 자동 변환합니다.</p>
    </main>
    <script src="./popup.js" type="module"></script>
  </body>
</html>
